# ============================================================================
# GitHub Actions Workflow для сборки ядра Linux 6.18.9-custom_v2
# ============================================================================

name: Build Linux Kernel 6.18.9-custom_v2

# Триггеры запуска
on:
  # Запуск вручную через вкладку Actions
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Версия ядра'
        required: false
        default: '6.18.9'
      
      config_type:
        description: 'Тип конфигурации (defconfig или custom)'
        required: false
        default: 'custom'
        type: choice
        options:
          - custom
          - defconfig

  # Запуск по расписанию (опционально, можно отключить)
  # schedule:
  #   - cron: '0 0 * * 0'  # Каждое воскресенье в 00:00

# Основная задача
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================================
      # ШАГ 1: Checkout репозитория
      # ============================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        # Checkout в корень рабочей директории (не в подпапку)
      
      # ============================================================================
      # ШАГ 2: Установка зависимостей
      # ============================================================================
      - name: Install build dependencies
        run: |
          echo "🔧 Установка зависимостей для сборки ядра..."
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            cpio \
            dwarves \
            wget \
            git \
            kmod
          echo "✅ Зависимости установлены"
      
      # ============================================================================
      # ШАГ 3: Загрузка исходников ядра
      # ============================================================================
      - name: Download kernel source
        run: |
          echo "📥 Загрузка исходников ядра..."
          KERNEL_VERSION="${{ github.event.inputs.kernel_version || '6.18.9' }}"

          # Скачиваем с kernel.org
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz

          # Распаковываем
          tar -xf linux-${KERNEL_VERSION}.tar.xz

          # Переименовываем для удобства
          mv linux-${KERNEL_VERSION} linux-build

          echo "✅ Исходники загружены: linux-${KERNEL_VERSION}"
          ls -lh
      
      # ============================================================================
      # ШАГ 4: Копирование конфигурации
      # ============================================================================
      - name: Copy kernel config
        run: |
          echo "📋 Копирование конфигурации..."
          CONFIG_TYPE="${{ github.event.inputs.config_type || 'custom' }}"
          
          # Отладка: показать структуру файлов
          echo ""
          echo "🔍 Структура репозитория:"
          ls -la
          echo ""
          echo "🔍 Поиск config_core:"
          find . -name "config_core" -o -name ".config" 2>/dev/null
          echo ""
          echo "🔍 GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE" 2>/dev/null | head -20
          echo ""
          
          # Переходим в папку с исходниками
          cd linux-build

          if [ "$CONFIG_TYPE" = "custom" ]; then
            # Используем нашу .config из репозитория
            # Проверяем несколько возможных путей
            if [ -f "$GITHUB_WORKSPACE/config_core" ]; then
              cp "$GITHUB_WORKSPACE/config_core" .config
              echo "✅ Использована custom конфигурация из \$GITHUB_WORKSPACE/config_core"
            elif [ -f "$GITHUB_WORKSPACE/.config" ]; then
              cp "$GITHUB_WORKSPACE/.config" .config
              echo "✅ Использована .config из репозитория"
            elif [ -f "../config_core" ]; then
              cp "../config_core" .config
              echo "✅ Использована custom конфигурация из ../config_core"
            elif [ -f "../.config" ]; then
              cp "../.config" .config
              echo "✅ Использована .config из ../.config"
            else
              echo "⚠️ .config не найдена, создаём defconfig"
              make defconfig
            fi
          else
            # Создаём дефолтную конфигурацию
            make defconfig
            echo "✅ Создана defconfig"
          fi

          # Показываем ключевые опции
          echo ""
          echo "📊 Ключевые опции конфигурации:"
          grep -E "^CONFIG_(IWLWIFI|SND_HDA|DRM_I915|PREEMPT|LOCALVERSION)=" .config | head -10
      
      # ============================================================================
      # ШАГ 5: Подготовка к сборке
      # ============================================================================
      - name: Prepare kernel build
        run: |
          echo "🔧 Подготовка к сборке..."
          cd linux-build

          # Генерация заголовков
          make prepare
          make scripts

          echo "✅ Подготовка завершена"

      # ============================================================================
      # ШАГ 6: Сборка ядра
      # ============================================================================
      - name: Build kernel
        run: |
          echo "🚀 Начало сборки ядра..."
          cd linux-build

          # Получаем количество доступных CPU
          CPU_COUNT=$(nproc)
          echo "📊 Доступно CPU: $CPU_COUNT"

          # Замер времени
          START_TIME=$(date +%s)

          # Сборка bzImage и модулей
          make -j$CPU_COUNT bzImage modules 2>&1 | tail -50

          # Время сборки
          END_TIME=$(date +%s)
          ELAPSED=$((END_TIME - START_TIME))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))

          echo ""
          echo "⏱️ Время сборки: ${MINUTES}м ${SECONDS}с"
          echo "✅ Сборка завершена!"

      # ============================================================================
      # ШАГ 7: Проверка результатов
      # ============================================================================
      - name: Check build results
        run: |
          echo "📊 Проверка результатов..."
          cd linux-build

          # Размер ядра
          echo ""
          echo "📦 Размер bzImage:"
          ls -lh arch/x86/boot/bzImage

          # Размер модулей
          echo ""
          echo "📦 Размер модулей:"
          du -sh modules_install/ 2>/dev/null || echo "Модули ещё не установлены"

          # Версия ядра
          echo ""
          echo "🏷️ Версия ядра:"
          cat include/config/kernel.release

          # Статистика конфигурации
          echo ""
          echo "📊 Статистика конфигурации:"
          scripts/config --list-missing 2>/dev/null | head -20 || echo "Все опции доступны"

      # ============================================================================
      # ШАГ 8: Установка модулей (опционально)
      # ============================================================================
      - name: Install modules
        run: |
          echo "📦 Установка модулей..."
          cd linux-build

          # Получаем версию ядра из .config
          KERNEL_RELEASE=$(cat include/config/kernel.release)
          echo "🏷️ Версия ядра: $KERNEL_RELEASE"

          # Устанавливаем модули напрямую в папку версии (без lib/modules обёртки)
          mkdir -p modules_install/$KERNEL_RELEASE
          make INSTALL_MOD_PATH=modules_install/$KERNEL_RELEASE modules_install

          echo "✅ Модули установлены"
          echo ""
          echo "📊 Размер модулей:"
          du -sh modules_install/$KERNEL_RELEASE

          # Показываем содержимое
          echo ""
          echo "📁 Содержимое:"
          ls -lh modules_install/$KERNEL_RELEASE

      # ============================================================================
      # ШАГ 9: Загрузка артефактов
      # ============================================================================
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-${{ github.event.inputs.kernel_version || '6.18.9' }}
          path: linux-build/arch/x86/boot/bzImage
          retention-days: 30

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ github.event.inputs.kernel_version || '6.18.9' }}
          path: ${{ github.workspace }}/linux-build/.config
          retention-days: 30
          if-no-files-found: warn  # Не ошибка если нет .config

      - name: Upload modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: modules-${{ github.event.inputs.kernel_version || '6.18.9' }}
          path: linux-build/modules_install/
          retention-days: 30
          # Загружаем папку с версией напрямую (6.18.9/)
      
      # ============================================================================
      # ШАГ 10: Финальное сообщение
      # ============================================================================
      - name: Build summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║              СБОРКА ЯДРА ЗАВЕРШЕНА! ✅                   ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Артефакты доступны для скачивания:"
          echo "   - bzImage (образ ядра)"
          echo "   - .config (конфигурация)"
          echo "   - modules (модули)"
          echo ""
          echo "⏱️ Для скачивания:"
          echo "   1. Вернитесь на страницу Actions"
          echo "   2. Откройте этот запуск"
          echo "   3. В разделе 'Artifacts' скачайте нужные файлы"
          echo ""
